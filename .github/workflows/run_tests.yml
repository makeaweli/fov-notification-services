# This workflow will install dependencies and run tests

name: Run tests

on:
  push:
  workflow_call:
    inputs:
      run_only_lint:
        description: 'Run only linting part of the workflow'
        type: boolean
        default: false
      run_only_tests:
        description: 'Run only tests part of the workflow'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  lint:
    if: ${{ github.event_name == 'push' || inputs.run_only_lint == true || inputs.run_only_tests != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
      - uses: chartboost/ruff-action@v1
        with:
          args: "check --output-format=github"

  test:
    if: ${{ github.event_name == 'push' || inputs.run_only_tests == true || inputs.run_only_lint != true }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_fov_notifications
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: services/operator
        run: uv sync --group dev

      - name: Run tests
        working-directory: services/operator
        run: uv run pytest -v
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_fov_notifications
